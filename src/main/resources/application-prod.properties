# Production configuration - all secrets via environment variables

# MongoDB - required env var
spring.data.mongodb.uri=${MONGODB_URI}

# Groq AI Configuration (OpenAI-compatible)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# Server port for Render
server.port=${PORT:8080}
