<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
  <h4 class="fw-bold py-3 mb-4">
    <span class="text-muted fw-light">Quiz /</span>
    <span th:text="${quiz.pdfFileName}">PDF Name</span>
  </h4>

  <div class="row">
    <div class="col-lg-12">
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Generated MCQ Questions</h5>
          <a th:href="@{/quiz}" class="btn btn-sm btn-outline-secondary">
            <i class="bx bx-arrow-back"></i> Back to Quiz List
          </a>
        </div>
        <div class="card-body">
          <p class="text-muted">
            <i class="bx bx-calendar"></i>
            Generated on: <span th:text="${#temporals.format(quiz.createdAt, 'dd MMMM yyyy, HH:mm')}"></span>
          </p>
          <hr>

          <!-- Questions Loop -->
          <div th:each="question, iterStat : ${quiz.questions}" class="mb-4">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">
                  <span class="badge bg-primary me-2" th:text="'Q' + ${iterStat.count}">Q1</span>
                  <span th:text="${question.question}">Question text</span>
                </h6>

                <div class="mt-3">
                  <div class="form-check mb-2"
                       th:classappend="${question.correctAnswer == 'A'} ? 'border border-success rounded p-2' : ''">
                    <input class="form-check-input" type="radio" disabled
                           th:checked="${question.correctAnswer == 'A'}">
                    <label class="form-check-label">
                      <strong>A.</strong> <span th:text="${question.optionA}">Option A</span>
                      <span th:if="${question.correctAnswer == 'A'}"
                            class="badge bg-success ms-2">Correct Answer</span>
                    </label>
                  </div>

                  <div class="form-check mb-2"
                       th:classappend="${question.correctAnswer == 'B'} ? 'border border-success rounded p-2' : ''">
                    <input class="form-check-input" type="radio" disabled
                           th:checked="${question.correctAnswer == 'B'}">
                    <label class="form-check-label">
                      <strong>B.</strong> <span th:text="${question.optionB}">Option B</span>
                      <span th:if="${question.correctAnswer == 'B'}"
                            class="badge bg-success ms-2">Correct Answer</span>
                    </label>
                  </div>

                  <div class="form-check mb-2"
                       th:classappend="${question.correctAnswer == 'C'} ? 'border border-success rounded p-2' : ''">
                    <input class="form-check-input" type="radio" disabled
                           th:checked="${question.correctAnswer == 'C'}">
                    <label class="form-check-label">
                      <strong>C.</strong> <span th:text="${question.optionC}">Option C</span>
                      <span th:if="${question.correctAnswer == 'C'}"
                            class="badge bg-success ms-2">Correct Answer</span>
                    </label>
                  </div>

                  <div class="form-check mb-2"
                       th:classappend="${question.correctAnswer == 'D'} ? 'border border-success rounded p-2' : ''">
                    <input class="form-check-input" type="radio" disabled
                           th:checked="${question.correctAnswer == 'D'}">
                    <label class="form-check-label">
                      <strong>D.</strong> <span th:text="${question.optionD}">Option D</span>
                      <span th:if="${question.correctAnswer == 'D'}"
                            class="badge bg-success ms-2">Correct Answer</span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

</html>
